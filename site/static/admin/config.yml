backend:
  name: github
  repo: maskintelligence-gif/MASK-BLOG
  branch: main
  auth_type: implicit
  client_id: "Iv23lihfq7VMhOJScEHu"  # Your GitHub Client ID
  auth_scope: public_repo

media_folder: "site/static/img"
public_folder: "/img"

collections:
  - name: "posts"  # Changed from "post" to "posts" (standard plural)
    label: "Posts"
    folder: "site/content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
      - label: "Description"
        name: "description"
        widget: "text"
      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"

  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "site/content/_index.md"
        fields:
          - label: "Title"
            name: "title"
            widget: "string"
          - label: "Subtitle"
            name: "subtitle"
            widget: "string"
          - label: "Hero Image"
            name: "image"
            widget: "image"
          - label: "Blurb"
            name: "blurb"
            widget: "object"
            fields:
              - label: "Heading"
                name: "heading"
                widget: "string"
              - label: "Text"
                name: "text"
                widget: "text"

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Site Configuration"
        name: "config"
        file: "site/hugo.toml"
        fields:
          - label: "Site Title"
            name: "title"
            widget: "string"
